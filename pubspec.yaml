name: pos_printers
description: "Android Flutter plugin for ESC/POS, ZPL, and TSPL printers over USB and network connections."
version: 0.7.2+2026032701
repository: https://github.com/KickNext/pos_printers
issue_tracker: https://github.com/KickNext/pos_printers/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  pigeon: ^22.7.0

flutter:
  plugin:
    platforms:
      android:
        package: com.kicknext.pos_printers
        pluginClass: PosPrintersPlugin
